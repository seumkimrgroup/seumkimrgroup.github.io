<!DOCTYPE html>
<html>
<head>
  <title>Se-Um Kim Research Group</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Page-specific overrides for compact people cards */
    .people-page .people-list {
      display: grid !important;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px !important;
      align-items: stretch;
    }

    .people-page .people-card,
    .people-page .former-people-card,
    .people-page .people-card-professor {
      width: 100% !important;
      min-width: 0 !important;
      max-width: none !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: flex-start !important;
      text-align: center !important;
      padding: 18px 14px !important;
      box-sizing: border-box;
      min-height: 200px;
      cursor: pointer;
    }

    .people-page .former-people-card {
      min-height: 160px;
      justify-content: center !important;
    }

    .people-page .people-photo {
      width: 88px !important;
      height: 88px !important;
      border-radius: 50% !important;
      object-fit: cover;
      margin: 0 0 12px 0 !important;
      flex-shrink: 0;
    }

    .people-page .people-info {
      width: 100%;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: flex-start !important;
      gap: 6px;
      text-align: center !important;
    }

    .people-page .people-info .text-3 {
      width: 100%;
      line-height: 1.35;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .people-page .people-info .text-5,
    .people-page .people-info .text-4 {
      width: 100%;
      line-height: 1.4;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .people-page .former-meta {
      opacity: 0.9;
    }

    .people-page .former-affiliation-label {
      margin-top: 4px;
      opacity: 0.75;
    }

    @media (max-width: 768px) {
      .people-page .people-list {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 12px !important;
      }

      .people-page .people-card,
      .people-page .former-people-card,
      .people-page .people-card-professor {
        padding: 14px 10px !important;
        min-height: 170px;
      }

      .people-page .former-people-card {
        min-height: 140px;
      }

      .people-page .people-photo {
        width: 72px !important;
        height: 72px !important;
        margin-bottom: 10px !important;
      }
    }
  </style>
</head>

<body>

  <div class="navbar">
    <a href="index.html" class="brand">Se-Um Kim Research Group</a>
    <div class="nav-links">
      <a href="people.html" class="active">People</a>
      <a href="publications.html">Publications</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

  <div class="content people-page">

    <div class="section section-heading">
      <div class="text-1">Current Members</div>
    </div>
  
    <div class="section">
      <div id="current-members"></div>
    </div>
  
    <div class="section section-heading">
      <div class="text-1">Former Members</div>
    </div>
  
    <div class="section">
      <div id="former-members"></div>
    </div>

  </div>

  <script src="people.js"></script>

  <script>
    const currentContainer = document.getElementById("current-members");
    const formerContainer = document.getElementById("former-members");
  
    function normalizeRole(role) {
      const r = (role || "")
        .toLowerCase()
        .replace(/\./g, "")
        .replace(/-/g, " ")
        .trim();
  
      if (r.includes("professor")) return "professor";
      if (r.includes("phd")) return "phd";
      if (r.includes("ms")) return "ms";
      if (r.includes("undergraduate")) return "undergraduate";
  
      return "";
    }
  
    function currentPriority(member) {
      const role = normalizeRole(member.role);
  
      if (role === "professor") return 0;
      if (role === "phd") return 1;
      if (role === "ms") return 2;
      if (role === "undergraduate") return 3;
  
      return 9;
    }
  
    function formerPriority(member) {
      const role = normalizeRole(member.role);
  
      if (role === "phd") return 1;
      if (role === "ms") return 2;
      if (role === "undergraduate") return 3;
  
      return 9;
    }
  
    function getDegreeLabel(role) {
      const r = normalizeRole(role);
  
      if (r === "phd") return "Ph.D.";
      if (r === "ms") return "M.S.";
      if (r === "undergraduate") return "B.S.";
  
      return role || "";
    }
  
    function formatRole(role) {
      const r = normalizeRole(role);
  
      if (r === "phd") return "Ph.D. Student";
      if (r === "ms") return "M.S. Student";
      if (r === "undergraduate") return "Undergraduate";
  
      return role || "";
    }
  
    function goToMember(member) {
      window.location.href = `person.html?id=${member.slug}`;
    }
  
    function createCurrentCard(member) {
      const item = document.createElement("div");
      item.className = "people-card";
  
      if (normalizeRole(member.role) === "professor") {
        item.classList.add("people-card-professor");
      }
  
      item.addEventListener("click", () => goToMember(member));
  
      const imageHtml = member.image
        ? `<img src="${member.image}" alt="${member.name}" class="people-photo">`
        : `<div class="people-photo people-photo-placeholder"></div>`;
  
      item.innerHTML = `
        ${imageHtml}
        <div class="people-info">
          <div class="text-3">${member.name}</div>
          <div class="text-5">${formatRole(member.role)}</div>
        </div>
      `;
  
      return item;
    }
  
    function createFormerCard(member) {
      const item = document.createElement("div");
      item.className = "people-card former-people-card";
  
      const degree = getDegreeLabel(member.role);
      const year = member.leaveYear || "";
      const statusLine = [degree, year].filter(Boolean).join(" · ");
      const nextAffiliation = member.nextAffiliation || "";
  
      item.innerHTML = `
        <div class="people-info">
          <div class="text-3">${member.name}</div>
          <div class="text-5 former-meta">${statusLine}</div>
          ${nextAffiliation ? `
            <div class="text-4 former-affiliation-label">Joined at</div>
            <div class="text-5">${nextAffiliation}</div>
          ` : ""}
        </div>
      `;
  
      return item;
    }
  
    function renderCurrentMembers(members) {
      currentContainer.innerHTML = "";
  
      const listDiv = document.createElement("div");
      listDiv.className = "people-list";
  
      members
        .sort((a, b) => {
          const p = currentPriority(a) - currentPriority(b);
          if (p !== 0) return p;
  
          const y = (a.joinYear || 9999) - (b.joinYear || 9999);
          if (y !== 0) return y;
  
          return a.name.localeCompare(b.name);
        })
        .forEach((member) => {
          listDiv.appendChild(createCurrentCard(member));
        });
  
      currentContainer.appendChild(listDiv);
    }
  
    function renderFormerMembers(members) {
      formerContainer.innerHTML = "";
  
      const listDiv = document.createElement("div");
      listDiv.className = "people-list";
  
      members
        .sort((a, b) => {
          const p = formerPriority(a) - formerPriority(b);
          if (p !== 0) return p;
  
          const y = (b.leaveYear || 0) - (a.leaveYear || 0);
          if (y !== 0) return y;
  
          return a.name.localeCompare(b.name);
        })
        .forEach((member) => {
          listDiv.appendChild(createFormerCard(member));
        });
  
      formerContainer.appendChild(listDiv);
    }
  
    function renderMembers() {
      const currentMembers = members.filter((m) => m.status === "current");
      const formerMembers = members.filter((m) => m.status === "former");
  
      renderCurrentMembers(currentMembers);
      renderFormerMembers(formerMembers);
    }
  
    renderMembers();
  </script>

</body>
</html>
