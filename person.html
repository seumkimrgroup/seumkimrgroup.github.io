<!DOCTYPE html>
<html>
<head>
  <title>Se-Um Kim Research Group</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="navbar">
    <a href="index.html" class="brand">Se-Um Kim Research Group</a>
    <div class="nav-links">
      <a href="people.html" class="active">People</a>
      <a href="publications.html">Publications</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

  <div class="content">
    <div id="member-detail"></div>
  </div>

  <script src="people.js"></script>
  <script src="publications.js"></script>

  <script>
    const container = document.getElementById("member-detail");

    function normalizeRole(role) {
      const r = (role || "")
        .toLowerCase()
        .replace(/\./g, "")
        .replace(/-/g, " ")
        .trim();

      if (r.includes("professor")) return "professor";
      if (r.includes("phd")) return "phd";
      if (r.includes("ms")) return "ms";
      if (r.includes("undergraduate")) return "undergraduate";

      return "";
    }

    function formatRole(role) {
      const r = normalizeRole(role);

      if (r === "phd") return "Ph.D. Student";
      if (r === "ms") return "M.S. Student";
      if (r === "undergraduate") return "Undergraduate";

      return role || "";
    }

    function formatMetaLine(pub) {
      let line = "";

      if (pub.source) line += pub.source;
      if (pub.detail) line += line ? ` ${pub.detail}` : pub.detail;
      if (pub.type !== "patent" && pub.year) line += ` (${pub.year})`;

      return line;
    }

    function isProfessor(member) {
      return normalizeRole(member.role) === "professor";
    }

    function getResearchInterests(member) {
      const section = (member.description || []).find(
        (d) => (d.title || "").toUpperCase() === "RESEARCH INTERESTS"
      );

      if (!section || !Array.isArray(section.content)) return [];

      return section.content.filter(Boolean);
    }

    function getEducation(member) {
      const section = (member.description || []).find(
        (d) => (d.title || "").toUpperCase() === "EDUCATION"
      );

      if (!section || !Array.isArray(section.content)) return [];

      return section.content.filter(Boolean);
    }

    function getMemberPublications(member) {
      if (!Array.isArray(publications)) return [];

      const memberName = (member.name || "").toLowerCase();

      return publications
        .filter((pub) => {
          const authors = (pub.authors || "").toLowerCase();
          return authors.includes(memberName);
        })
        .sort((a, b) => (b.year || 0) - (a.year || 0));
    }

    function createPublicationCard(pub) {
      const metaLine = formatMetaLine(pub);

      const cardInner = `
        <div class="text-3">${pub.title || ""}</div>
        <div class="text-4">${metaLine}</div>
        <div class="text-5">${pub.authors || ""}</div>
      `;

      let item;

      if (pub.link) {
        item = document.createElement("a");
        item.href = pub.link;
        item.target = "_blank";
        item.rel = "noopener noreferrer";
        item.className = "publication-card clickable";
        item.innerHTML = cardInner;
      } else {
        item = document.createElement("div");
        item.className = "publication-card";
        item.innerHTML = cardInner;
      }

      return item;
    }

    function renderSection(title, items) {
      if (!items || items.length === 0) return "";

      const itemsHtml = items
        .map((item) => `<div class="text-5">${item}</div>`)
        .join("");

      return `
        <div class="member-block">
          <div class="text-2 member-block-title">${title}</div>
          <div class="member-block-body">
            ${itemsHtml}
          </div>
        </div>
      `;
    }

    function renderPublicationsSection(member) {
      if (isProfessor(member)) return "";

      const pubs = getMemberPublications(member);

      if (pubs.length === 0) {
        return `
          <div class="member-block">
            <div class="text-2 member-block-title">Publications</div>
            <div class="text-5">No publications found.</div>
          </div>
        `;
      }

      const listWrap = document.createElement("div");
      listWrap.className = "member-block";

      listWrap.innerHTML = `
        <div class="text-2 member-block-title">Publications</div>
        <div id="member-publication-list"></div>
      `;

      return listWrap.outerHTML;
    }

    function renderMember(member) {
      const imageHtml = member.image
        ? `<img src="${member.image}" alt="${member.name}" class="people-photo member-photo">`
        : `<div class="people-photo people-photo-placeholder member-photo"></div>`;

      const educationHtml = renderSection("Education", getEducation(member));
      const interestsHtml = renderSection("Research Interests", getResearchInterests(member));
      const publicationsHtml = renderPublicationsSection(member);

      container.innerHTML = `
        <div class="member-profile-card">
          ${imageHtml}
          <div class="people-info people-info-pi">
            <div class="text-1 member-name">${member.name}</div>
            <div class="text-5 member-role">${formatRole(member.role)}</div>
            ${member.email ? `<div class="text-4">${member.email}</div>` : ""}
            ${member.office ? `<div class="text-4">${member.office}</div>` : ""}
          </div>
        </div>

        ${educationHtml}
        ${interestsHtml}
        ${publicationsHtml}
      `;

      if (!isProfessor(member)) {
        const pubList = document.getElementById("member-publication-list");
        const pubs = getMemberPublications(member);

        if (pubList) {
          pubs.forEach((pub) => {
            pubList.appendChild(createPublicationCard(pub));
          });
        }
      }
    }

    if (typeof members === "undefined" || !Array.isArray(members)) {
      container.innerHTML = `<div class="text-2">Member data could not be loaded.</div>`;
    } else {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      const member = members.find((m) => m.slug === id) || members[0];

      if (!member) {
        container.innerHTML = `<div class="text-2">Member not found.</div>`;
      } else {
        renderMember(member);
      }
    }
  </script>

</body>
</html>
