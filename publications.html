<!DOCTYPE html>
<html>
<head>
  <title>Se-Um Kim Research Group</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="navbar">
    <a href="index.html" class="brand">Se-Um Kim Research Group</a>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="research.html">Research</a>
      <a href="members.html">Members</a>
      <a href="publications.html" class="active">Publications</a>
    </div>
  </div>

  <div class="content publications-page">
    <div class="section">
      <div class="text-1 page-title">Publications</div>
    </div>

  <div class="section">
    <div class="filter-card">
      <input
        type="text"
        id="searchInput"
        class="search-box"
        placeholder="Search publications"
      >
      
      <div class="filter-group-wrap">
        <div class="filter-group">
          <div class="filter-bar">
            <button class="filter-btn type-btn active" data-type="all" type="button">All</button>
            <button class="filter-btn type-btn" data-type="sci" type="button">SCI</button>
            <button class="filter-btn type-btn" data-type="non-sci" type="button">Non-SCI</button>
            <button class="filter-btn type-btn" data-type="patent" type="button">Patent</button>
          </div>
        </div>
    
        <div class="filter-group">
          <div class="filter-bar">
            <button class="filter-btn year-btn active" data-year="all" type="button">All</button>
            <button class="filter-btn year-btn" data-year="2026" type="button">2026</button>
            <button class="filter-btn year-btn" data-year="2025" type="button">2025</button>
            <button class="filter-btn year-btn" data-year="2024-earlier" type="button">2024 earlier</button>
          </div>
        </div>
      </div>
    </div>
  </div>

    <div id="publication-list" class="pub-list"></div>
  </div>

  <div class="footer">
    <div class="text-5">
      (01811) 서울특별시 노원구 공릉로 232 서울과학기술대학교 전기정보공학과<br>
      Electrical and Information Engineering, Seoul National University of Science and Technology<br>
      Gongneung-ro 232, Nowon-gu, 01811 Seoul, Republic of Korea
    </div>
  </div>

  <script src="publications.js"></script>

  <script>
    const container = document.getElementById("publication-list");
    const searchInput = document.getElementById("searchInput");
  
    const typeButtons = document.querySelectorAll(".type-btn");
    const yearButtons = document.querySelectorAll(".year-btn");
  
    let currentType = "all";
    let currentYear = "all";
  
    function formatMetaLine(pub) {
      let line = "";
  
      if (pub.source) {
        line += pub.source;
      }
  
      if (pub.detail) {
        line += line ? ` ${pub.detail}` : pub.detail;
      }
  
      if (pub.type !== "patent" && pub.year) {
        line += ` (${pub.year})`;
      }
  
      return line;
    }
  
    function matchesYear(pubYear, selectedYear) {
      if (selectedYear === "all") return true;
    
      const yearNum = Number(selectedYear);
    
      if (selectedYear === "2024-earlier") {
        return pubYear <= 2024;
      }
    
      return pubYear === yearNum;
    }
  
    function renderPublications() {
      const keyword = searchInput.value.trim().toLowerCase();
      container.innerHTML = "";
  
      const filtered = publications.filter((pub) => {
        const matchesType =
          currentType === "all" || pub.type === currentType;
  
        const matchesYearFilter = matchesYear(pub.year, currentYear);
  
        const searchTarget = [
          pub.title || "",
          pub.authors || "",
          pub.source || "",
          pub.detail || "",
          String(pub.year || "")
        ]
          .join(" ")
          .toLowerCase();
  
        const matchesSearch = searchTarget.includes(keyword);
  
        return matchesType && matchesYearFilter && matchesSearch;
      });
  
      if (filtered.length === 0) {
        container.innerHTML =
          '<div class="text-5 empty-state">No publications found.</div>';
        return;
      }
  
      filtered
        .sort((a, b) => (b.year || 0) - (a.year || 0))
        .forEach((pub) => {
          const metaLine = formatMetaLine(pub);
  
          const item = document.createElement("div");
          item.className = "item publication-item";
  
          const cardTag = pub.link ? "a" : "div";
          const cardAttributes = pub.link
            ? `href="${pub.link}" target="_blank" rel="noopener noreferrer"`
            : "";
          const cardClass = pub.link
            ? "publication-card clickable"
            : "publication-card";
  
          item.innerHTML = `
            <${cardTag} class="${cardClass}" ${cardAttributes}>
              <div class="text-3">${pub.title}</div>
              <div class="text-4">${metaLine}</div>
              <div class="text-5">${pub.authors || ""}</div>
            </${cardTag}>
          `;
  
          container.appendChild(item);
        });
    }
  
    typeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        typeButtons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
        currentType = button.dataset.type;
        renderPublications();
      });
    });
  
    yearButtons.forEach((button) => {
      button.addEventListener("click", () => {
        yearButtons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
        currentYear = button.dataset.year;
        renderPublications();
      });
    });
  
    searchInput.addEventListener("input", renderPublications);
  
    renderPublications();
  </script>

  
</body>
</html>
