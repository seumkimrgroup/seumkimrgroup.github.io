<!DOCTYPE html>
<html>
<head>
    <title>Se-Um Kim Research Group</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/cards.css">
    <link rel="stylesheet" href="assets/css/pages/publications.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body>
    <div class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="brand text-brand">Se-Um Kim Research Group</a>
            <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu" aria-expanded="false">☰</button>
            <div class="nav-links">
                <a href="people.html" class="text-nav">People</a>
                <a href="publications.html" class="active text-nav">Publications</a>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="section">
            <div class="container container--centered publications-search-card">
                <input type="text"
                    id="searchInput"
                    class="publications-search-box"
                    placeholder="Search by title, journal, author, and year">

                <div class="publications-filter-controls">
                    <div class="filter-group publications-type-group">
                        <button class="filter-btn type-btn active" data-type="all">ALL</button>
                        <button class="filter-btn type-btn" data-type="indexed">INDEXED</button>
                        <button class="filter-btn type-btn" data-type="patent">PATENT</button>
                        <button class="filter-btn type-btn" data-type="other">OTHER</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div id="publication-list" class="container"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <p>© 2025 Se-Um Kim Research Group · Seoul National University of Science and Technology · All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/js/nav.js"></script>
    <script type="module" src="assets/js/publications.js"></script>
</body>
</html>
