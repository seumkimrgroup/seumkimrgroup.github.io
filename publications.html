<!doctype html>
<html>
  <head>
    <title>Se-Um Kim Research Group</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/tokens.css" />
    <link rel="stylesheet" href="assets/css/typography.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/cards.css" />
    <link rel="stylesheet" href="assets/css/pages/publications.css" />
  </head>

  <body>
    <div class="navbar"></div>
    <script src="assets/js/navbar.js"></script>

    <div class="main">
      <div class="section">
        <div class="inner inner--search">
          <input
            type="text"
            id="searchInput"
            class="publications-search-box"
            placeholder="Search by title, journal, author, and year"
          />

          <div class="group">
            <button class="btn type-btn active" data-type="all">All</button>
            <button class="btn type-btn" data-type="indexed">Indexed</button>
            <button class="btn type-btn" data-type="patent">Patent</button>
            <button class="btn type-btn" data-type="other">Other</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div id="publication-list" class="stack"></div>
      </div>
    </div>

    <footer class="footer" id="contact"></footer>

    <script src="assets/js/footer.js"></script>
    <script src="assets/js/nav.js"></script>
    <script type="module" src="assets/js/publications.js"></script>
  </body>
</html>
