<!DOCTYPE html>
<html>
<head>
  <title>Se-Um Kim Research Group</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="navbar">
    <a href="index.html" class="brand">Se-Um Kim Research Group</a>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="research.html">Research</a>
      <a href="members.html">Members</a>
      <a href="publications.html" class="active">Publications</a>
    </div>
  </div>

  <div class="content publications-page">

    <div class="section">
      <div class="text-1">Publications</div>
    </div>

    <div class="section">
      <div class="search-card">
      
        <input
          type="text"
          id="searchInput"
          class="search-box"
          placeholder="Search by title, journal, author"
        >
      
        <div class="filter-controls">
      
          <div class="filter-group">
            <button class="filter-btn type-btn active" data-type="all">All</button>
            <button class="filter-btn type-btn" data-type="sci">SCI</button>
            <button class="filter-btn type-btn" data-type="non-sci">Non-SCI</button>
            <button class="filter-btn type-btn" data-type="patent">Patent</button>
          </div>
      
          <div class="filter-group">
            <button class="filter-btn year-btn active" data-year="all">All</button>
            <button class="filter-btn year-btn" data-year="2026">2026</button>
            <button class="filter-btn year-btn" data-year="2025">2025</button>
            <button class="filter-btn year-btn" data-year="2024-earlier">2024 earlier</button>
          </div>
        </div>
      </div>
    </div>

    <div id="publication-list"></div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="text-5">
      (01811) 서울특별시 노원구 공릉로 232 서울과학기술대학교 전기정보공학과<br>
      Electrical and Information Engineering, Seoul National University of Science and Technology<br>
      Gongneung-ro 232, Nowon-gu, 01811 Seoul, Republic of Korea
    </div>
  </div>

  <!-- JS -->
  <script src="publications.js"></script>

  <script>
    const container = document.getElementById("publication-list");
    const searchInput = document.getElementById("searchInput");

    const typeButtons = document.querySelectorAll(".type-btn");
    const yearButtons = document.querySelectorAll(".year-btn");

    let currentType = "all";
    let currentYear = "all";

    function formatMetaLine(pub) {
      let line = "";

      if (pub.source) line += pub.source;
      if (pub.detail) line += line ? ` ${pub.detail}` : pub.detail;
      if (pub.type !== "patent" && pub.year) line += ` (${pub.year})`;

      return line;
    }

    function matchesYear(pubYear, selectedYear) {
      if (selectedYear === "all") return true;

      if (selectedYear === "2024-earlier") {
        return pubYear <= 2024;
      }

      return pubYear === Number(selectedYear);
    }

    function renderPublications() {
      const keyword = searchInput.value.trim().toLowerCase();
      container.innerHTML = "";

      const filtered = publications.filter((pub) => {
        const matchesType = currentType === "all" || pub.type === currentType;
        const matchesYearFilter = matchesYear(pub.year, currentYear);

        const searchTarget = [
          pub.title || "",
          pub.authors || "",
          pub.source || "",
          pub.detail || "",
          String(pub.year || "")
        ].join(" ").toLowerCase();

        const matchesSearch = searchTarget.includes(keyword);

        return matchesType && matchesYearFilter && matchesSearch;
      });

      if (filtered.length === 0) {
        container.innerHTML =
          '<div class="text-5">No publications found.</div>';
        return;
      }

      filtered
        .sort((a, b) => (b.year || 0) - (a.year || 0))
        .forEach((pub) => {

          const metaLine = formatMetaLine(pub);

          const cardInner = `
            <div class="text-3">${pub.title}</div>
            <div class="text-4">${metaLine}</div>
            <div class="text-5">${pub.authors || ""}</div>
          `;

          let item;

          if (pub.link) {
            item = document.createElement("a");
            item.href = pub.link;
            item.target = "_blank";
            item.rel = "noopener noreferrer";
            item.className = "publication-card clickable";
            item.innerHTML = cardInner;
          } else {
            item = document.createElement("div");
            item.className = "publication-card";
            item.innerHTML = cardInner;
          }

          container.appendChild(item);
        });
    }

    typeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        typeButtons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
        currentType = button.dataset.type;
        renderPublications();
      });
    });

    yearButtons.forEach((button) => {
      button.addEventListener("click", () => {
        yearButtons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
        currentYear = button.dataset.year;
        renderPublications();
      });
    });

    searchInput.addEventListener("input", renderPublications);

    renderPublications();
  </script>

</body>
</html>
