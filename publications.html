<!DOCTYPE html>
<html>
<head>
  <title>Se-Um Kim Research Group</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="navbar">
    <a href="index.html" class="brand">Se-Um Kim Research Group</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="research.html">Research</a>
      <a href="members.html">Members</a>
      <a href="publications.html" class="active">Publications</a>
    </div>
  </div>

  <div class="content">
    <div class="section">
      <div class="text-title">Publications</div>
    </div>

    <div class="section filter-bar">
      <button class="filter-btn active" data-filter="all" type="button">All</button>
      <button class="filter-btn" data-filter="international" type="button">International</button>
      <button class="filter-btn" data-filter="domestic" type="button">Domestic</button>
      <button class="filter-btn" data-filter="patent" type="button">Patent</button>
    </div>

    <div class="section">
      <input type="text" id="searchInput" class="search-box" placeholder="Search publications">
    </div>

    <div class="section" id="publication-list"></div>
  </div>

  <div class="footer">
    <div class="text-sub">
      (01811) 서울특별시 노원구 공릉로 232 서울과학기술대학교 전기정보공학과<br>
      Electrical and Information Engineering, Seoul National University of Science and Technology<br>
      Gongneung-ro 232, Nowon-gu, 01811 Seoul, Republic of Korea
    </div>
  </div>

  <script src="publications.js"></script>
  <script>
    const container = document.getElementById("publication-list");
    const searchInput = document.getElementById("searchInput");
    const filterButtons = document.querySelectorAll(".filter-btn");

    let currentFilter = "all";

    function renderPublications() {
      const keyword = searchInput.value.trim().toLowerCase();
      container.innerHTML = "";

      const filtered = publications.filter((pub) => {
        const matchesFilter = currentFilter === "all" || pub.type === currentFilter;
        const matchesSearch =
          pub.title.toLowerCase().includes(keyword) ||
          pub.journal.toLowerCase().includes(keyword) ||
          pub.authors.toLowerCase().includes(keyword);

        return matchesFilter && matchesSearch;
      });

      if (filtered.length === 0) {
        container.innerHTML = '<div class="text-sub">No publications found.</div>';
        return;
      }

      filtered.forEach((pub) => {
        const item = document.createElement("div");
        item.className = "item publication-item";

        item.innerHTML = `
          <div class="text-title">
            <a href="${pub.link}" target="_blank" rel="noopener noreferrer">${pub.title}</a>
          </div>
          <div class="text-sub">${pub.journal}</div>
          <div class="text-sub">${pub.authors}</div>
        `;

        container.appendChild(item);
      });
    }

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        filterButtons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
        currentFilter = button.dataset.filter;
        renderPublications();
      });
    });

    searchInput.addEventListener("input", renderPublications);

    renderPublications();
  </script>
</body>
</html>
