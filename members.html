<!DOCTYPE html>
<html>
<head>
  <title>Se-Um Kim Research Group</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="navbar">
    <a href="index.html" class="brand">Se-Um Kim Research Group</a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="research.html">Research</a>
      <a href="members.html">Members</a>
      <a href="publications.html">Publications</a>
    </div>
  </div>

  <div class="content members-page">

    <div class="section">
      <div class="text-title page-title">Members</div>
      <div class="text-sub page-subtitle">Research Group</div>
    </div>

    <div class="section">
      <div class="text-title">CURRENT MEMBERS</div>
      <div id="current-members" class="member-list"></div>
    </div>

    <div class="section">
      <div class="text-title">FORMER MEMBERS</div>
      <div id="former-members" class="member-list"></div>
    </div>

  </div>

<script src="members.js"></script>

  <script>
    const currentContainer = document.getElementById("current-members");
    const formerContainer = document.getElementById("former-members");
  
    function normalizeRole(role) {
      const r = (role || "").toLowerCase();
  
      if (r.includes("professor")) return "professor";
      if (r.includes("phd")) return "phd";
      if (r.includes("ms")) return "ms";
      if (r.includes("undergraduate")) return "undergraduate";
  
      return "";
    }
  
    function currentPriority(member) {
      const role = normalizeRole(member.role);
  
      if (role === "professor") return 0;
      if (role === "phd") return 1;
      if (role === "ms") return 2;
      if (role === "undergraduate") return 3;
  
      return 9;
    }
  
    function formerPriority(member) {
      const role = normalizeRole(member.role);
  
      if (role === "phd") return 1;
      if (role === "ms") return 2;
      if (role === "undergraduate") return 3;
  
      return 9;
    }
  
    function getDegreeLabel(role) {
      const r = normalizeRole(role);
  
      if (r === "phd") return "Ph.D.";
      if (r === "ms") return "M.S.";
      if (r === "undergraduate") return "B.S.";
  
      return role || "";
    }
  
    function goToMember(member) {
      window.location.href = `member.html?id=${member.slug}`;
    }
  
    function createCurrentCard(member) {
      const item = document.createElement("div");
      item.className = "member-card";
      item.addEventListener("click", () => goToMember(member));
  
      const imageHtml = member.image
        ? `<img src="${member.image}" alt="${member.name}" class="member-photo">`
        : `<div class="member-photo member-photo-placeholder"></div>`;
  
      item.innerHTML = `
        ${imageHtml}
        <div class="member-info">
          <div class="text-title">${member.name}</div>
          <div class="text-sub">${member.role || ""}</div>
        </div>
      `;
  
      return item;
    }
  
    function createFormerCard(member) {
      const item = document.createElement("div");
      item.className = "member-card";
      item.addEventListener("click", () => goToMember(member));
  
      const degree = getDegreeLabel(member.role);
      const year = member.leaveYear || "";
      const imageHtml = member.image
        ? `<img src="${member.image}" alt="${member.name}" class="member-photo">`
        : `<div class="member-photo member-photo-placeholder"></div>`;
  
      item.innerHTML = `
        ${imageHtml}
        <div class="member-info">
          <div class="text-title">${member.name}</div>
          <div class="text-sub">${degree} ${year}</div>
        </div>
      `;
  
      return item;
    }
  
    function renderMembers() {
      currentContainer.innerHTML = "";
      formerContainer.innerHTML = "";
  
      const currentMembers = members
        .filter((m) => m.status === "current")
        .sort((a, b) => {
          const p = currentPriority(a) - currentPriority(b);
          if (p !== 0) return p;
  
          const y = (a.joinYear || 9999) - (b.joinYear || 9999);
          if (y !== 0) return y;
  
          return a.name.localeCompare(b.name);
        });
  
      const formerMembers = members
        .filter((m) => m.status === "former")
        .sort((a, b) => {
          const p = formerPriority(a) - formerPriority(b);
          if (p !== 0) return p;
  
          const y = (b.leaveYear || 0) - (a.leaveYear || 0);
          if (y !== 0) return y;
  
          return a.name.localeCompare(b.name);
        });
  
      currentMembers.forEach((member) => {
        currentContainer.appendChild(createCurrentCard(member));
      });
  
      formerMembers.forEach((member) => {
        formerContainer.appendChild(createFormerCard(member));
      });
    }
  
    renderMembers();
  </script>

</body>
</html>
